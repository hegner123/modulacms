name: Windows

on:
  push:
    branches: [ "main", "develop", "dev" ]
    paths-ignore:
      - 'sdks/**'
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'sdks/**'

jobs:
  build-amd64:
    runs-on: windows-latest
    name: build-windows-amd64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Capture Windows PATH
        id: win-path
        shell: pwsh
        run: |
          echo "path=$env:PATH" >> $env:GITHUB_OUTPUT

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-libwebp

      - name: Build
        shell: msys2 {0}
        env:
          CGO_ENABLED: 1
          GOOS: windows
          GOARCH: amd64
          WPATH: ${{ steps.win-path.outputs.path }}
        run: |
          IFS=';' read -ra DIRS <<< "$WPATH"
          for d in "${DIRS[@]}"; do
            export PATH="$(cygpath "$d"):$PATH"
          done
          export PATH="/mingw64/bin:$PATH"
          export CC=gcc
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u '+%Y-%m-%d_%H:%M:%S')

          go build \
            -ldflags="-X 'github.com/hegner123/modulacms/internal/utility.Version=$VERSION' \
            -X 'github.com/hegner123/modulacms/internal/utility.GitCommit=$COMMIT' \
            -X 'github.com/hegner123/modulacms/internal/utility.BuildDate=$BUILD_DATE'" \
            -o modulacms-windows-amd64.exe ./cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: modulacms-windows-amd64
          path: modulacms-windows-amd64.exe

  build-arm64:
    runs-on: windows-latest
    name: build-windows-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Capture Windows PATH
        id: win-path
        shell: pwsh
        run: |
          echo "path=$env:PATH" >> $env:GITHUB_OUTPUT

      - name: Install llvm-mingw (ARM64 cross-compiler)
        shell: pwsh
        run: |
          $version = "20260311"
          $url = "https://github.com/mstorsjo/llvm-mingw/releases/download/$version/llvm-mingw-$version-ucrt-x86_64.zip"
          Invoke-WebRequest -Uri $url -OutFile llvm-mingw.zip
          Expand-Archive -Path llvm-mingw.zip -DestinationPath C:\llvm-mingw
          $dir = (Get-ChildItem C:\llvm-mingw -Directory)[0].FullName
          echo "LLVM_MINGW=$dir" >> $env:GITHUB_ENV

      - name: Build libwebp for ARM64
        shell: pwsh
        run: |
          $webpVersion = "1.5.0"
          $url = "https://storage.googleapis.com/downloads.webmproject.org/releases/webp/libwebp-$webpVersion.tar.gz"
          Invoke-WebRequest -Uri $url -OutFile libwebp.tar.gz
          tar xzf libwebp.tar.gz
          $srcDir = "libwebp-$webpVersion"
          $installDir = "C:\libwebp-arm64"
          New-Item -ItemType Directory -Force -Path $installDir
          $env:PATH = "$env:LLVM_MINGW\bin;$env:PATH"
          Push-Location $srcDir
          & aarch64-w64-mingw32-gcc -c -O2 -DWEBP_EXTERN= -I. `
            src/enc/alpha_enc.c src/enc/analysis_enc.c src/enc/backward_references_cost_enc.c `
            src/enc/backward_references_enc.c src/enc/config_enc.c src/enc/cost_enc.c `
            src/enc/filter_enc.c src/enc/frame_enc.c src/enc/histogram_enc.c `
            src/enc/iterator_enc.c src/enc/near_lossless_enc.c src/enc/picture_csp_enc.c `
            src/enc/picture_enc.c src/enc/picture_psnr_enc.c src/enc/picture_rescale_enc.c `
            src/enc/picture_tools_enc.c src/enc/predictor_enc.c src/enc/quant_enc.c `
            src/enc/syntax_enc.c src/enc/token_enc.c src/enc/tree_enc.c `
            src/enc/vp8l_enc.c src/enc/webp_enc.c `
            src/dsp/alpha_processing.c src/dsp/cost.c src/dsp/enc.c `
            src/dsp/enc_neon.c src/dsp/lossless_enc.c src/dsp/lossless_enc_neon.c `
            src/dsp/ssim.c src/dsp/cpu.c `
            src/utils/bit_reader_utils.c src/utils/bit_writer_utils.c `
            src/utils/color_cache_utils.c src/utils/filters_utils.c `
            src/utils/huffman_encode_utils.c src/utils/huffman_utils.c `
            src/utils/quant_levels_utils.c src/utils/random_utils.c `
            src/utils/rescaler_utils.c src/utils/thread_utils.c src/utils/utils.c
          & aarch64-w64-mingw32-ar rcs libwebp.a *.o
          Pop-Location
          New-Item -ItemType Directory -Force -Path "$installDir\lib"
          New-Item -ItemType Directory -Force -Path "$installDir\include\webp"
          Copy-Item "$srcDir\libwebp.a" "$installDir\lib\"
          Copy-Item "$srcDir\src\webp\*.h" "$installDir\include\webp\"
          echo "LIBWEBP_DIR=$installDir" >> $env:GITHUB_ENV

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: base

      - name: Build
        shell: msys2 {0}
        env:
          CGO_ENABLED: 1
          GOOS: windows
          GOARCH: arm64
          WPATH: ${{ steps.win-path.outputs.path }}
        run: |
          IFS=';' read -ra DIRS <<< "$WPATH"
          for d in "${DIRS[@]}"; do
            export PATH="$(cygpath "$d"):$PATH"
          done

          LLVM_DIR=$(cygpath "$LLVM_MINGW")
          WEBP_DIR=$(cygpath "$LIBWEBP_DIR")
          export PATH="$LLVM_DIR/bin:$PATH"
          export CC=aarch64-w64-mingw32-gcc
          export CGO_CFLAGS="-I$WEBP_DIR/include"
          export CGO_LDFLAGS="-L$WEBP_DIR/lib"

          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u '+%Y-%m-%d_%H:%M:%S')

          go build \
            -ldflags="-X 'github.com/hegner123/modulacms/internal/utility.Version=$VERSION' \
            -X 'github.com/hegner123/modulacms/internal/utility.GitCommit=$COMMIT' \
            -X 'github.com/hegner123/modulacms/internal/utility.BuildDate=$BUILD_DATE'" \
            -o modulacms-windows-arm64.exe ./cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: modulacms-windows-arm64
          path: modulacms-windows-arm64.exe
